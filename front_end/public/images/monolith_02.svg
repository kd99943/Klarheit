<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <!-- Solid Dark Premium Lens Gradient -->
    <linearGradient id="solidLensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.35" />
    </linearGradient>
    <!-- Deep Obsidian Acetate Texture -->
    <linearGradient id="obsidianGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <!-- Metallic Gold Accents -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#92400e" />
    </linearGradient>
    <filter id="premiumShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020617" flood-opacity="0.08" />
    </filter>
  </defs>

  <g filter="url(#premiumShadow)">
    <!-- Thick Acetate Temples (Sides) -->
    <path d="M 110 175 Q 70 170, 40 230" fill="none" stroke="url(#obsidianGrad)" stroke-width="12" stroke-linecap="round" />
    <path d="M 490 175 Q 530 170, 560 230" fill="none" stroke="url(#obsidianGrad)" stroke-width="12" stroke-linecap="round" />

    <!-- Left Bold Acetate Frame & Lens -->
    <rect x="120" y="145" width="155" height="95" rx="24" fill="url(#solidLensGrad)" />
    <rect x="120" y="145" width="155" height="95" rx="24" fill="none" stroke="url(#obsidianGrad)" stroke-width="15" stroke-linejoin="round" />

    <!-- Right Bold Acetate Frame & Lens -->
    <rect x="325" y="145" width="155" height="95" rx="24" fill="url(#solidLensGrad)" />
    <rect x="325" y="145" width="155" height="95" rx="24" fill="none" stroke="url(#obsidianGrad)" stroke-width="15" stroke-linejoin="round" />

    <!-- Chunky Bridge -->
    <path d="M 268 174 Q 300 166, 332 174" fill="none" stroke="url(#obsidianGrad)" stroke-width="16" stroke-linecap="round" />

    <!-- Signature Polished Gold Stud Hinge Accents (Japanese Craftsmanship) -->
    <circle cx="134" cy="170" r="3.5" fill="url(#goldGrad)" />
    <circle cx="144" cy="170" r="3.5" fill="url(#goldGrad)" />
    
    <circle cx="466" cy="170" r="3.5" fill="url(#goldGrad)" />
    <circle cx="456" cy="170" r="3.5" fill="url(#goldGrad)" />

    <!-- Sharp High-end Highlights (Reflections) -->
    <path d="M 142 160 Q 210 152, 240 160" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.25" />
    <path d="M 347 160 Q 415 152, 445 160" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.25" />
  </g>
</svg>
