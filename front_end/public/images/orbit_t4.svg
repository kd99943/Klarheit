<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <!-- Soft Blue/Lavender Lens Gradient -->
    <linearGradient id="blueLensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16" />
      <stop offset="60%" stop-color="#818cf8" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.14" />
    </linearGradient>
    <!-- Luxurious Rose Gold Metallic Gradient -->
    <linearGradient id="roseGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fda4af" />
      <stop offset="35%" stop-color="#fb7185" />
      <stop offset="70%" stop-color="#e11d48" />
      <stop offset="100%" stop-color="#9f1239" />
    </linearGradient>
    <filter id="wireframeShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#fb7185" flood-opacity="0.05" />
    </filter>
  </defs>

  <g filter="url(#wireframeShadow)">
    <!-- Thin Wire Temples -->
    <path d="M 125 190 Q 80 185, 45 235" fill="none" stroke="url(#roseGoldGrad)" stroke-width="2" stroke-linecap="round" />
    <path d="M 475 190 Q 520 185, 555 235" fill="none" stroke="url(#roseGoldGrad)" stroke-width="2" stroke-linecap="round" />
    
    <!-- Wire hinges -->
    <rect x="123" y="187" width="4" height="6" fill="#fb7185" />
    <rect x="473" y="187" width="4" height="6" fill="#fb7185" />

    <!-- Left Round Wire Lens & Rim -->
    <circle cx="210" cy="190" r="54" fill="url(#blueLensGrad)" />
    <circle cx="210" cy="190" r="54" fill="none" stroke="url(#roseGoldGrad)" stroke-width="3" />

    <!-- Right Round Wire Lens & Rim -->
    <circle cx="390" cy="190" r="54" fill="url(#blueLensGrad)" />
    <circle cx="390" cy="190" r="54" fill="none" stroke="url(#roseGoldGrad)" stroke-width="3" />

    <!-- Elegant High Arch Wire Bridge -->
    <path d="M 264 190 C 275 168, 325 168, 336 190" fill="none" stroke="url(#roseGoldGrad)" stroke-width="3.5" stroke-linecap="round" />

    <!-- Minimalist Nose Pads -->
    <path d="M 258 200 C 263 204, 263 214, 259 220" fill="none" stroke="url(#roseGoldGrad)" stroke-width="1.5" />
    <path d="M 342 200 C 337 204, 337 214, 341 220" fill="none" stroke="url(#roseGoldGrad)" stroke-width="1.5" />
    <ellipse cx="258" cy="214" rx="2.5" ry="5.5" fill="#f8fafc" opacity="0.9" />
    <ellipse cx="342" cy="214" rx="2.5" ry="5.5" fill="#f8fafc" opacity="0.9" />

    <!-- High-glare Circular Reflections -->
    <path d="M 172 165 A 46 46 0 0 1 205 146" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.35" />
    <path d="M 352 165 A 46 46 0 0 1 385 146" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.35" />
  </g>
</svg>
